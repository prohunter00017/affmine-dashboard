# AffMine Publisher Dashboard — Docker Compose
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in AFF_ID and API_KEY.
#   2. docker compose up --build
#
# The dashboard will be available at http://localhost:3000
# The API server is reachable at http://localhost:5000

services:
  postgres:
    image: postgres:16-alpine
    container_name: affmine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: affmine
      POSTGRES_PASSWORD: affmine
      POSTGRES_DB: affmine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affmine -d affmine"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: affmine-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "5000"
      DATABASE_URL: "postgresql://affmine:affmine@postgres:5432/affmine"
      AFF_ID: "${AFF_ID}"
      API_KEY: "${API_KEY}"
      NODE_ENV: production
    ports:
      - "${API_PORT:-5000}:5000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: affmine-dashboard
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT:-3000}:80"

volumes:
  pgdata:
